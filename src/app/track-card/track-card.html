<article class="card" [class.active]="active()" [appHighlightFavorite]="track().favorite">
  <img [src]="track().coverUrl" [alt]="track().title" />
  <h3>{{ track().title }}</h3>
  <p>{{ track().artist }}</p>
  <p class="duration">{{ track().durationSeconds | durationFormat }}</p>

  @switch (true) {
    @case (track().rating >= 9) {
      <span class="badge gold">⭐ Coup de cœur</span>
    }
    @case (track().rating >= 7) {
      <span class="badge">👍 Recommandé</span>
    }
    @default {
      <span class="badge muted">À découvrir</span>
    }
  }

  @if (active()) {
    <span class="badge">En lecture</span>
  }

  <div class="actions">
    <button type="button" class="view" (click)="selectTrack()">
      Voir<span class="sr-only"> {{ track().title }}</span>
    </button>

    @if (favoriteEnabled()) {
      <button
        type="button"
        class="favorite"
        [class.is-favorite]="track().favorite"
        [attr.aria-pressed]="track().favorite"
        [attr.aria-label]="track().favorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
        (click)="toggleFavorite()"
      >
        {{ track().favorite ? '★ Favori' : '☆ Favori' }}
      </button>
    }
  </div>
</article>
