<label class="search">
  <span>Recherche</span>
  <input
    type="search"
    placeholder="Rechercher un titre ou un artiste…"
    [value]="term()"
    (input)="term.set($any($event.target).value)"
  />
</label>

@if (favoriteError()) {
  <p class="error" role="alert">Impossible de mettre à jour les favoris. Réessayez.</p>
}

<app-track-list
  [tracks]="tracks()"
  [favoriteEnabled]="favoritesEnabled"
  (trackSelected)="openTrack($event)"
  (favoriteToggled)="onFavoriteToggle($event)"
/>
